run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec

linters-settings:
  goimports:
    local-prefixes: github.com/axelgar/opentree
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # G204 (subprocess with dynamic args) is a structural non-issue here: every
    # exec.Command call in this repo passes args directly (argv), never through
    # a shell, so shell-metacharacter injection isn't possible. Other gosec
    # rules (e.g. G306 file perms) still apply everywhere.
    - linters:
        - gosec
      text: "G204"
