version: "2"
linters:
  enable:
    - gosec
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      # G204: every exec.Command passes args as argv (never through a shell), so
      # dynamic-arg subprocess calls cannot inject shell metacharacters here.
      - linters:
          - gosec
        text: G204
      # G703: taint analysis flags file paths derived from $HOME/$ZSH and known
      # config locations. This CLI legitimately manages the user's own dotfiles
      # (~/.zshrc, ~/.claude/settings.json, ...) — those are not untrusted input.
      - linters:
          - gosec
        text: G703
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/axelgar/opentree
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
